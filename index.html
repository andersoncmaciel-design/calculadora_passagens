<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Valor de Passagens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Calculadora de Valor de Passagens</h1>

    <label>Ano:</label>
    <input type="number" id="ano" value="2026">

    <label>Mês:</label>
    <input type="number" id="mes" min="1" max="12" value="6">

    <label>Valor da passagem:</label>
    <input type="number" id="valor" step="0.01">

    <label>Passagens por dia:</label>
    <input type="number" id="passagens" value="2">

    <button onclick="calcular()">
        Calcular
    </button>

    <h2>Resultado</h2>
    <div id="resultado"></div>

</div>

<script src="script.js"></script>

</body>
</html>
